---
- name: Setup K6 VM
  hosts: k6
  become: true

  tasks:
    - name: Get latest k6 version from GitHub
      ansible.builtin.uri:
        url: https://api.github.com/repos/grafana/k6/releases/latest
        return_content: true
      register: k6_release

    - name: Set k6 version
      ansible.builtin.set_fact:
        k6_version: "{{ k6_release.json.tag_name | regex_replace('^v', '') }}"

    - name: Show k6 version to install
      ansible.builtin.debug:
        msg: "Installing k6 {{ k6_version }}"

    - name: Download k6 RPM
      ansible.builtin.get_url:
        url: "https://github.com/grafana/k6/releases/download/v{{ k6_version }}/k6-v{{ k6_version }}-linux-amd64.rpm"
        dest: "/tmp/k6.rpm"

    - name: Install k6
      ansible.builtin.dnf:
        name: /tmp/k6.rpm
        state: present
        disable_gpg_check: true

    - name: Remove RPM
      ansible.builtin.file:
        path: /tmp/k6.rpm
        state: absent

    - name: Verify k6
      ansible.builtin.command: k6 version
      register: k6_check
      changed_when: false

    - name: Show k6 version
      ansible.builtin.debug:
        msg: "{{ k6_check.stdout }}"

    - name: Set sysctl parameters for high concurrency
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: "net.core.somaxconn",           value: "65535" }
        - { key: "net.ipv4.tcp_max_syn_backlog",  value: "65535" }
        - { key: "net.core.netdev_max_backlog",   value: "65535" }
        - { key: "net.ipv4.ip_local_port_range",  value: "1024 65535" }
        - { key: "net.ipv4.tcp_tw_reuse",         value: "1" }

    - name: Set file descriptor limits
      ansible.builtin.copy:
        dest: /etc/security/limits.d/90-benchtest.conf
        content: |
          benchadmin soft nofile 65535
          benchadmin hard nofile 65535
          benchadmin soft nproc  65535
          benchadmin hard nproc  65535
        mode: "0644"

    - name: Create /opt/k6 directory
      ansible.builtin.file:
        path: /opt/k6
        state: directory
        owner: benchadmin
        group: benchadmin
        mode: "0755"
